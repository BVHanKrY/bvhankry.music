<!DOCTYPE html>
<html lang="es">
<head>

<!-- 🔹 HEAD (CONFIGURACIÓN) -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BVHanKrY - Pulso EP</title>

<meta name="description" content="Dub Music desde Ecuador - BVHanKrY">
<meta name="theme-color" content="#050505">

<link rel="manifest" href="manifest.json">

<!-- 🎨 ESTILOS -->
<style>
:root{
  --bg:#050505;
  --card:#111;
  --accent:#00ffcc;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

header{
  display:flex;
  gap:20px;
  align-items:center;
}

.header-art{
  width:140px;
  border-radius:16px;
}

.track{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:var(--accent);
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

.player{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.install-btn{
  position:fixed;
  top:10px;
  right:10px;
}
</style>

</head>

<body>

<!-- 📲 BOTÓN INSTALAR -->
<button id="installBtn" class="install-btn">📲 Instalar</button>

<div class="container">

<!-- 🎵 HEADER -->
<header>
<img src="https://i.imgur.com/8Km9tLL.jpg" class="header-art">
<div>
<h1>BVHanKrY</h1>
<p>Pulso EP</p>
</div>
</header>

<!-- 🎧 TRACKS -->
<div id="tracks"></div>

</div>

<!-- 🎛 PLAYER -->
<div class="player">
<span id="currentTrack">Nada reproduciendo</span>
<button id="playPause">▶</button>
</div>

<!-- 🧠 JAVASCRIPT -->
<script type="module">

// 🎵 LISTA DE CANCIONES (EDITA AQUÍ)
const tracks = [
{
title:"Tinkuy",
src:"https://TU-LINK/tinkuy.mp3"
},
{
title:"Subtle Gad",
src:"https://TU-LINK/Subtle_gad.mp3"
}
];

let currentAudio = null;

// 🎧 RENDER
const container = document.getElementById("tracks");

tracks.forEach(track=>{
  const div = document.createElement("div");
  div.className = "track";

  div.innerHTML = `
    <span>${track.title}</span>
    <button>▶</button>
  `;

  const btn = div.querySelector("button");

  btn.addEventListener("click", ()=>{
    playTrack(track);
  });

  container.appendChild(div);
});

// ▶ PLAY
function playTrack(track){
  if(currentAudio) currentAudio.pause();

  currentAudio = new Audio(track.src);
  currentAudio.play();

  document.getElementById("currentTrack").textContent = track.title;
}

// ⏯ CONTROL
document.getElementById("playPause").addEventListener("click", ()=>{
  if(!currentAudio) return;

  if(currentAudio.paused){
    currentAudio.play();
  }else{
    currentAudio.pause();
  }
});

// 📲 INSTALAR APP
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;
});

document.getElementById("installBtn").addEventListener("click", async ()=>{
  if(!deferredPrompt) return;

  deferredPrompt.prompt();
  deferredPrompt = null;
});

// 🔄 SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
